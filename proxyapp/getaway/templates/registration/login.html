<!doctype html>
{% load static %}
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EZPR0XY Login</title>
  <style>
    :root {
      --poster-yellow: #f3cf2d;
      --poster-red: #b71c21;
      --poster-black: #111111;
      --paper: #f7da52;
      --danger: #8f1016;
    }

    * { box-sizing: border-box; }

    body {
      position: relative;
      margin: 0;
      min-height: 100vh;
      font-family: "Arial Black", "Impact", "Trebuchet MS", sans-serif;
      color: var(--poster-black);
      background: var(--poster-yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow: hidden;
    }

    .skip-link {
      position: absolute;
      top: -40px;
      left: 12px;
      z-index: 10;
      padding: 8px 10px;
      border-radius: 8px;
      border: 2px solid var(--poster-red);
      background: #fff0a9;
      color: #111;
      font-family: "Trebuchet MS", sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .skip-link:focus {
      top: 12px;
    }

    .side-figure {
      position: fixed;
      bottom: 0;
      width: clamp(260px, 26vw, 420px);
      max-height: 92vh;
      object-fit: contain;
      pointer-events: none;
      opacity: 0.95;
      z-index: 0;
      filter: drop-shadow(0 12px 22px rgba(0, 0, 0, .25));
    }

    .side-figure.left {
      left: -40px;
      transform: scaleX(-1);
    }

    .side-figure.right {
      right: -40px;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      border: 4px solid var(--poster-red);
      background: linear-gradient(180deg, #f7da52 0%, var(--poster-yellow) 100%);
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .18);
      animation: reveal .35s ease-out;
    }

    h1 {
      margin: 0;
      font-size: 40px;
      line-height: .9;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: var(--poster-red);
    }

    .sub {
      margin: 10px 0 18px;
      color: #1b1b1b;
      font-size: 14px;
      font-family: "Trebuchet MS", sans-serif;
      font-weight: 700;
    }

    form p {
      margin: 0 0 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #1b1b1b;
      font-family: "Trebuchet MS", sans-serif;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 2px solid #222;
      background: #f7da52;
      color: #111;
      font-size: 14px;
      outline: none;
      font-family: "Trebuchet MS", sans-serif;
    }

    input:focus {
      border-color: var(--poster-red);
    }

    ul.errorlist {
      list-style: none;
      margin: 0 0 8px;
      padding: 0;
      color: var(--danger);
      font-size: 12px;
      font-family: "Trebuchet MS", sans-serif;
      font-weight: 700;
    }

    button {
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      border: none;
      background: var(--poster-red);
      color: #f8db58;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: transform .12s ease, filter .12s ease;
      font-family: "Trebuchet MS", sans-serif;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    input:focus-visible,
    button:focus-visible,
    a:focus-visible {
      outline: 3px solid #111;
      outline-offset: 2px;
    }

    .back {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      font-family: "Trebuchet MS", sans-serif;
      font-weight: 700;
    }

    a {
      color: #8f1016;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      .side-figure { width: clamp(210px, 24vw, 300px); opacity: .75; }
      .side-figure.left { left: -70px; }
      .side-figure.right { right: -70px; }
    }

    @media (max-width: 760px) {
      .side-figure {
        display: block;
        width: clamp(150px, 38vw, 220px);
        opacity: .35;
      }
      .side-figure.left { left: -85px; }
      .side-figure.right { right: -85px; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#login-card">Ana icerige gec</a>
  <img class="side-figure left" src="{% static 'getaway/media/hero-cutout.png' %}" alt="" aria-hidden="true" />
  <img class="side-figure right" src="{% static 'getaway/media/hero-cutout.png' %}" alt="" aria-hidden="true" />
  <main class="card" id="login-card" tabindex="-1">
    <h1>EZPR0XY LOGIN</h1>
    <p class="sub">This is where your legal proxy journey begins.</p>

    <form method="post" aria-label="User login form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>

    <div class="back">
      <a href="/">Back to Home</a>
    </div>
  </main>
</body>
</html>
